<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>截图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
    }
    /* 背景截图 */
    #bg {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    /* 半透明遮罩 */
    #mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }
    /* 选择框 */
    #selection {
      position: absolute;
      border: 2px solid #2260FA;
      background: transparent;
      display: none;
      box-sizing: border-box;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }
    /* 绘制画布（在选区内的标注层） */
    #draw-canvas {
      position: absolute;
      display: none;
      cursor: crosshair;
      z-index: 5;
    }
    /* 尺寸提示 */
    #size-tip {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 2px 6px;
      font-size: 12px;
      border-radius: 2px;
      display: none;
      pointer-events: none;
      z-index: 10;
    }
    /* 工具栏 */
    #toolbar {
      position: absolute;
      display: none;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      padding: 4px 6px;
      gap: 2px;
      z-index: 20;
      align-items: center;
    }
    #toolbar.show {
      display: flex;
    }
    .tool-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #333;
      transition: background 0.15s, color 0.15s;
    }
    .tool-btn:hover {
      background: #f0f0f0;
    }
    .tool-btn.active {
      color: #2260FA;
      background: #e8f0ff;
    }
    .tool-btn.danger:hover {
      color: #ff4757;
    }
    .tool-btn.confirm {
      color: #2260FA;
    }
    .tool-btn.confirm:hover {
      color: #1a4fd6;
      background: #e8f0ff;
    }
    .tool-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .toolbar-divider {
      width: 1px;
      height: 18px;
      background: #e0e0e0;
      margin: 0 3px;
    }
    /* 颜色选择器 */
    #color-picker {
      display: none;
      gap: 4px;
      align-items: center;
      margin-left: 4px;
    }
    #color-picker.show {
      display: flex;
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
    }
    .color-dot:hover {
      transform: scale(1.15);
    }
    .color-dot.active {
      border-color: #999;
    }
    /* 文字输入框 */
    #text-input {
      position: absolute;
      display: none;
      background: transparent;
      border: 1px dashed #2260FA;
      color: #ff4757;
      font-size: 18px;
      font-family: 'Microsoft YaHei', sans-serif;
      padding: 2px 4px;
      outline: none;
      min-width: 60px;
      min-height: 24px;
      z-index: 15;
      resize: none;
      overflow: hidden;
      white-space: pre;
    }
    /* 提示文字 */
    #hint {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 14px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <img id="bg" alt="" />
  <div id="mask"></div>
  <div id="selection"></div>
  <canvas id="draw-canvas"></canvas>
  <div id="size-tip"></div>
  <textarea id="text-input" spellcheck="false"></textarea>

  <!-- 工具栏：矩形/椭圆/箭头/画笔/文字/马赛克 | 撤销/重做 | 下载/取消/确定 -->
  <div id="toolbar">
    <button class="tool-btn" data-tool="rect" title="矩形">
      <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="1" /></svg>
    </button>
    <button class="tool-btn" data-tool="ellipse" title="椭圆">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="6" /></svg>
    </button>
    <button class="tool-btn" data-tool="arrow" title="箭头">
      <svg viewBox="0 0 24 24"><path d="M5 19 L19 5 M19 5 L13 5 M19 5 L19 11" /></svg>
    </button>
    <button class="tool-btn" data-tool="pen" title="画笔">
      <svg viewBox="0 0 24 24"><path d="M3 21l3-1 12-12-2-2L4 18l-1 3z" /><path d="M14 6l2 2" /></svg>
    </button>
    <button class="tool-btn" data-tool="text" title="文字">
      <svg viewBox="0 0 24 24"><path d="M5 6V4h14v2 M12 4v16 M9 20h6" /></svg>
    </button>
    <button class="tool-btn" data-tool="mosaic" title="马赛克">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="6" height="6" fill="currentColor"/><rect x="15" y="3" width="6" height="6" fill="currentColor"/><rect x="9" y="9" width="6" height="6" fill="currentColor"/><rect x="3" y="15" width="6" height="6" fill="currentColor"/><rect x="15" y="15" width="6" height="6" fill="currentColor"/></svg>
    </button>

    <!-- 颜色选择器 -->
    <div id="color-picker">
      <div class="toolbar-divider"></div>
      <div class="color-dot active" data-color="#ff4757" style="background:#ff4757"></div>
      <div class="color-dot" data-color="#ffa502" style="background:#ffa502"></div>
      <div class="color-dot" data-color="#2ed573" style="background:#2ed573"></div>
      <div class="color-dot" data-color="#2260FA" style="background:#2260FA"></div>
      <div class="color-dot" data-color="#000000" style="background:#000000"></div>
      <div class="color-dot" data-color="#ffffff" style="background:#ffffff;border-color:#ccc"></div>
    </div>

    <div class="toolbar-divider"></div>
    <button class="tool-btn" id="undo-btn" title="撤销">
      <svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4" /><path d="M5 10h9a5 5 0 0 1 0 10h-2" /></svg>
    </button>
    <button class="tool-btn" id="redo-btn" title="重做">
      <svg viewBox="0 0 24 24"><path d="M15 14l4-4-4-4" /><path d="M19 10h-9a5 5 0 0 0 0 10h2" /></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn" id="download-btn" title="下载">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="M7 10l5 5 5-5" /><path d="M12 15V3" /></svg>
    </button>
    <button class="tool-btn danger" id="cancel-btn" title="取消">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18" /><path d="M6 6l12 12" /></svg>
    </button>
    <button class="tool-btn confirm" id="confirm-btn" title="确定">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" /></svg>
    </button>
  </div>

  <div id="hint">按住鼠标左键拖动选择截图区域，按 Esc 取消</div>

  <script>
    const { ipcRenderer } = require('electron');

    const bgImg = document.getElementById('bg');
    const selection = document.getElementById('selection');
    const drawCanvas = document.getElementById('draw-canvas');
    const sizeTip = document.getElementById('size-tip');
    const toolbar = document.getElementById('toolbar');
    const hint = document.getElementById('hint');
    const confirmBtn = document.getElementById('confirm-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const downloadBtn = document.getElementById('download-btn');
    const undoBtn = document.getElementById('undo-btn');
    const redoBtn = document.getElementById('redo-btn');
    const colorPicker = document.getElementById('color-picker');
    const textInput = document.getElementById('text-input');

    // 选区状态
    let startX = 0;
    let startY = 0;
    let endX = 0;
    let endY = 0;
    let isSelecting = false;
    let hasSelection = false;
    let selectionLocked = false; // 选区是否已锁定（开始进入标注阶段）

    // 截图数据
    let screenshotDataUrl = '';
    let dpr = 1;
    let bgImageElement = null; // 原始全屏截图，用于裁剪与马赛克采样
    // overlay 相对于完整屏幕的偏移（逻辑像素），用于多屏 / 任务栏区域定位
    let offsetX = 0;
    let offsetY = 0;
    let fullWidth = 0;
    let fullHeight = 0;
    let overlayWidth = 0;
    let overlayHeight = 0;

    // 工具状态
    let currentTool = null; // null | 'rect' | 'ellipse' | 'arrow' | 'pen' | 'text' | 'mosaic'
    let currentColor = '#ff4757';
    let drawCtx = null;
    let isDrawing = false;
    let drawStartX = 0;
    let drawStartY = 0;
    let drawHistory = []; // 每个元素：ImageData
    let drawHistoryIndex = -1;
    let drawSnapshot = null; // 绘制过程中保存的快照
    let penPoints = []; // 画笔轨迹

    // 接收主进程发送的截图数据
    ipcRenderer.on('screenshot-data', (event, payload) => {
      screenshotDataUrl = payload.dataUrl;
      dpr = payload.scaleFactor || 1;
      offsetX = payload.offsetX || 0;
      offsetY = payload.offsetY || 0;
      fullWidth = payload.fullWidth || 0;
      fullHeight = payload.fullHeight || 0;
      overlayWidth = payload.overlayWidth || window.innerWidth;
      overlayHeight = payload.overlayHeight || window.innerHeight;

      // 通过 CSS 偏移让背景图正确对齐到 workArea 中
      // 背景图尺寸 = 完整屏幕，overlay 仅显示 workArea，因此需要负偏移裁剪
      bgImg.style.width = fullWidth + 'px';
      bgImg.style.height = fullHeight + 'px';
      bgImg.style.left = (-offsetX) + 'px';
      bgImg.style.top = (-offsetY) + 'px';
      bgImg.src = screenshotDataUrl;

      // 预加载原图用于裁剪/马赛克
      const img = new Image();
      img.onload = () => {
        bgImageElement = img;
      };
      img.src = screenshotDataUrl;
    });

    /**
     * 更新选择框位置和尺寸
     */
    function updateSelection() {
      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      selection.style.display = 'block';
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = w + 'px';
      selection.style.height = h + 'px';

      sizeTip.style.display = 'block';
      sizeTip.textContent = `${Math.round(w * dpr)} × ${Math.round(h * dpr)}`;
      const tipTop = y - 22 < 0 ? y + 4 : y - 22;
      sizeTip.style.left = x + 'px';
      sizeTip.style.top = tipTop + 'px';
    }

    /**
     * 显示工具栏
     */
    function showToolbar() {
      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);
      const right = x + w;
      const bottom = y + h;

      toolbar.classList.add('show');
      let tbLeft = right - toolbar.offsetWidth;
      let tbTop = bottom + 6;
      if (tbLeft < 0) tbLeft = 0;
      if (tbTop + toolbar.offsetHeight > window.innerHeight) {
        tbTop = y - toolbar.offsetHeight - 6;
        if (tbTop < 0) tbTop = bottom - toolbar.offsetHeight - 6;
      }
      toolbar.style.left = tbLeft + 'px';
      toolbar.style.top = tbTop + 'px';
    }

    function hideToolbar() {
      toolbar.classList.remove('show');
    }

    /**
     * 初始化绘制画布到选区位置
     */
    function initDrawCanvas() {
      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      drawCanvas.style.display = 'block';
      drawCanvas.style.left = x + 'px';
      drawCanvas.style.top = y + 'px';
      drawCanvas.style.width = w + 'px';
      drawCanvas.style.height = h + 'px';
      drawCanvas.width = w;
      drawCanvas.height = h;
      drawCtx = drawCanvas.getContext('2d');
      drawCtx.lineCap = 'round';
      drawCtx.lineJoin = 'round';

      drawHistory = [];
      drawHistoryIndex = -1;
      pushHistory();
    }

    /**
     * 保存当前画布状态到历史
     */
    function pushHistory() {
      if (!drawCtx) return;
      // 截断到当前索引（撤销后再绘制会舍弃后续历史）
      drawHistory = drawHistory.slice(0, drawHistoryIndex + 1);
      drawHistory.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
      drawHistoryIndex = drawHistory.length - 1;
      // 限制最大历史
      if (drawHistory.length > 30) {
        drawHistory.shift();
        drawHistoryIndex--;
      }
    }

    function undo() {
      if (drawHistoryIndex <= 0) return;
      drawHistoryIndex--;
      drawCtx.putImageData(drawHistory[drawHistoryIndex], 0, 0);
    }

    function redo() {
      if (drawHistoryIndex >= drawHistory.length - 1) return;
      drawHistoryIndex++;
      drawCtx.putImageData(drawHistory[drawHistoryIndex], 0, 0);
    }

    /**
     * 设置当前工具
     */
    function setTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.tool === tool);
      });
      if (tool === 'mosaic') {
        colorPicker.classList.remove('show');
      } else if (tool) {
        colorPicker.classList.add('show');
      } else {
        colorPicker.classList.remove('show');
      }
      // 文字工具特殊处理：鼠标按下后会弹出输入框
      drawCanvas.style.pointerEvents = tool ? 'auto' : 'none';
      drawCanvas.style.cursor = (tool === 'text') ? 'text' : 'crosshair';
    }

    /**
     * 锁定选区，进入标注阶段
     */
    function lockSelection() {
      if (selectionLocked) return;
      selectionLocked = true;
      // 阻止 body 默认 cursor 影响
      document.body.style.cursor = 'default';
      initDrawCanvas();
    }

    /* ===================== 选区绘制阶段 ===================== */
    document.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (selectionLocked) return;
      if (toolbar.contains(e.target)) return;

      isSelecting = true;
      hasSelection = false;
      startX = e.clientX;
      startY = e.clientY;
      endX = e.clientX;
      endY = e.clientY;
      hint.style.display = 'none';
      hideToolbar();
      selection.style.display = 'none';
      sizeTip.style.display = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isSelecting) return;
      endX = e.clientX;
      endY = e.clientY;
      updateSelection();
    });

    document.addEventListener('mouseup', (e) => {
      if (!isSelecting) return;
      isSelecting = false;
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);
      if (w < 3 || h < 3) {
        selection.style.display = 'none';
        sizeTip.style.display = 'none';
        hasSelection = false;
        return;
      }
      hasSelection = true;
      lockSelection();
      showToolbar();
    });

    /* ===================== 工具栏交互 ===================== */
    document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const tool = btn.dataset.tool;
        if (currentTool === tool) {
          setTool(null);
        } else {
          setTool(tool);
        }
      });
    });

    document.querySelectorAll('.color-dot').forEach((dot) => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        currentColor = dot.dataset.color;
        document.querySelectorAll('.color-dot').forEach((d) => d.classList.remove('active'));
        dot.classList.add('active');
      });
    });

    undoBtn.addEventListener('click', (e) => { e.stopPropagation(); undo(); });
    redoBtn.addEventListener('click', (e) => { e.stopPropagation(); redo(); });
    downloadBtn.addEventListener('click', (e) => { e.stopPropagation(); downloadScreenshot(); });
    confirmBtn.addEventListener('click', (e) => { e.stopPropagation(); completeScreenshot(); });
    cancelBtn.addEventListener('click', (e) => { e.stopPropagation(); cancelScreenshot(); });

    /* ===================== 画布绘制 ===================== */
    drawCanvas.addEventListener('mousedown', (e) => {
      if (!currentTool) return;
      if (e.button !== 0) return;

      const rect = drawCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 文字工具：单独处理
      if (currentTool === 'text') {
        showTextInput(x, y);
        return;
      }

      isDrawing = true;
      drawStartX = x;
      drawStartY = y;
      penPoints = [{ x, y }];

      // 保存当前画布快照（用于矩形/椭圆/箭头预览）
      drawSnapshot = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);

      if (currentTool === 'pen') {
        drawCtx.strokeStyle = currentColor;
        drawCtx.lineWidth = 3;
        drawCtx.beginPath();
        drawCtx.moveTo(x, y);
      } else if (currentTool === 'mosaic') {
        // 马赛克立即绘制
        applyMosaic(x, y);
      }
    });

    drawCanvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const rect = drawCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      if (currentTool === 'pen') {
        drawCtx.lineTo(x, y);
        drawCtx.stroke();
        penPoints.push({ x, y });
      } else if (currentTool === 'mosaic') {
        applyMosaic(x, y);
      } else {
        // 矩形/椭圆/箭头：恢复快照后重绘
        drawCtx.putImageData(drawSnapshot, 0, 0);
        drawCtx.strokeStyle = currentColor;
        drawCtx.lineWidth = 2;
        drawCtx.fillStyle = currentColor;
        if (currentTool === 'rect') {
          drawCtx.strokeRect(drawStartX, drawStartY, x - drawStartX, y - drawStartY);
        } else if (currentTool === 'ellipse') {
          const cx = (drawStartX + x) / 2;
          const cy = (drawStartY + y) / 2;
          const rx = Math.abs(x - drawStartX) / 2;
          const ry = Math.abs(y - drawStartY) / 2;
          drawCtx.beginPath();
          drawCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
          drawCtx.stroke();
        } else if (currentTool === 'arrow') {
          drawArrow(drawStartX, drawStartY, x, y);
        }
      }
    });

    drawCanvas.addEventListener('mouseup', (e) => {
      if (!isDrawing) return;
      isDrawing = false;
      drawSnapshot = null;
      pushHistory();
    });

    /**
     * 绘制箭头
     */
    function drawArrow(x1, y1, x2, y2) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const headLen = Math.min(18, Math.hypot(x2 - x1, y2 - y1) * 0.35);
      drawCtx.strokeStyle = currentColor;
      drawCtx.fillStyle = currentColor;
      drawCtx.lineWidth = 2;
      drawCtx.beginPath();
      drawCtx.moveTo(x1, y1);
      drawCtx.lineTo(x2, y2);
      drawCtx.stroke();
      // 箭头头部
      drawCtx.beginPath();
      drawCtx.moveTo(x2, y2);
      drawCtx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 7), y2 - headLen * Math.sin(angle - Math.PI / 7));
      drawCtx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 7), y2 - headLen * Math.sin(angle + Math.PI / 7));
      drawCtx.closePath();
      drawCtx.fill();
    }

    /**
     * 应用马赛克效果
     */
    function applyMosaic(cx, cy) {
      const blockSize = 10;
      const radius = 18;
      if (!bgImageElement) return;

      const selX = Math.min(startX, endX);
      const selY = Math.min(startY, endY);

      // 将选区内的当前画布像素 与 原图采样后的 马赛克块混合
      // 这里简单做法：在选区内对应位置从原图采样一块平均色，再绘制
      for (let dy = -radius; dy < radius; dy += blockSize) {
        for (let dx = -radius; dx < radius; dx += blockSize) {
          const px = cx + dx;
          const py = cy + dy;
          if (px < 0 || py < 0 || px >= drawCanvas.width || py >= drawCanvas.height) continue;
          // 对应原图像素坐标（考虑 DPR 与 workArea offset）
          const srcX = Math.round((selX + px + offsetX) * dpr);
          const srcY = Math.round((selY + py + offsetY) * dpr);
          const srcBlock = Math.max(2, Math.round(blockSize * dpr));
          // 取该块的中心颜色
          drawCtx.drawImage(
            bgImageElement,
            srcX, srcY, srcBlock, srcBlock,
            px, py, blockSize, blockSize
          );
        }
      }
    }

    /* ===================== 文字工具 ===================== */
    function showTextInput(x, y) {
      const rect = drawCanvas.getBoundingClientRect();
      textInput.style.display = 'block';
      textInput.style.left = (rect.left + x) + 'px';
      textInput.style.top = (rect.top + y) + 'px';
      textInput.style.color = currentColor;
      textInput.value = '';
      textInput.dataset.x = x;
      textInput.dataset.y = y;
      setTimeout(() => textInput.focus(), 10);
    }

    function commitText() {
      const value = textInput.value;
      const tx = parseFloat(textInput.dataset.x);
      const ty = parseFloat(textInput.dataset.y);
      if (value && !isNaN(tx) && !isNaN(ty)) {
        drawCtx.fillStyle = currentColor;
        drawCtx.font = '18px "Microsoft YaHei", sans-serif';
        drawCtx.textBaseline = 'top';
        const lines = value.split('\n');
        lines.forEach((line, i) => {
          drawCtx.fillText(line, tx + 4, ty + 4 + i * 22);
        });
        pushHistory();
      }
      textInput.style.display = 'none';
      textInput.value = '';
    }

    textInput.addEventListener('blur', commitText);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        commitText();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        textInput.style.display = 'none';
        textInput.value = '';
      }
      e.stopPropagation();
    });
    textInput.addEventListener('input', () => {
      // 自适应宽高
      textInput.style.width = 'auto';
      textInput.style.width = (textInput.scrollWidth + 4) + 'px';
      textInput.style.height = 'auto';
      textInput.style.height = (textInput.scrollHeight) + 'px';
    });

    /* ===================== 完成 / 取消 / 下载 ===================== */
    /**
     * 生成最终裁剪后的截图 dataUrl
     * @returns {string}
     */
    function generateFinalDataUrl() {
      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      const canvas = document.createElement('canvas');
      const cropW = Math.round(w * dpr);
      const cropH = Math.round(h * dpr);
      canvas.width = cropW;
      canvas.height = cropH;
      const ctx = canvas.getContext('2d');

      // 1. 先绘制原图裁剪后的部分（注意：原图坐标需加上 offset）
      if (bgImageElement) {
        ctx.drawImage(
          bgImageElement,
          Math.round((x + offsetX) * dpr),
          Math.round((y + offsetY) * dpr),
          cropW, cropH,
          0, 0,
          cropW, cropH
        );
      }
      // 2. 再叠加标注画布（按 DPR 放大）
      if (drawCanvas && drawCanvas.width > 0 && drawCanvas.height > 0) {
        ctx.drawImage(drawCanvas, 0, 0, drawCanvas.width, drawCanvas.height, 0, 0, cropW, cropH);
      }
      return canvas.toDataURL('image/png');
    }

    function completeScreenshot() {
      if (!hasSelection) return;
      try {
        const dataUrl = generateFinalDataUrl();
        ipcRenderer.send('screenshot-complete', { dataUrl });
      } catch (err) {
        console.error('完成截图失败', err);
        ipcRenderer.send('screenshot-cancel');
      }
    }

    function cancelScreenshot() {
      ipcRenderer.send('screenshot-cancel');
    }

    function downloadScreenshot() {
      if (!hasSelection) return;
      try {
        const dataUrl = generateFinalDataUrl();
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `screenshot_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (err) {
        console.error('下载截图失败', err);
      }
    }

    /* ===================== 键盘事件 ===================== */
    document.addEventListener('keydown', (e) => {
      if (e.target === textInput) return;
      if (e.key === 'Escape') {
        cancelScreenshot();
      } else if (e.key === 'Enter' && hasSelection) {
        completeScreenshot();
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        if (e.shiftKey) {
          redo();
        } else {
          undo();
        }
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
        e.preventDefault();
        redo();
      }
    });

    // 阻止右键菜单：取消截图
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      cancelScreenshot();
    });
  </script>
</body>
</html>
