<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>悬浮球</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      user-select: none;
    }

    .floating-ball-box {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-ball {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      -webkit-app-region: drag;
    }

    .floating-ball:active {
      cursor: grabbing;
      transform: scale(1.05);
    }
    svg {
      -webkit-app-region: no-drag;
    }
  </style>
</head>

<body>
  <div class="floating-ball-box">
    <div class="floating-ball" id="ball">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="white">
        <circle cx="12" cy="12" r="10" fill="rgba(255,255,255,0.9)" />
        <circle cx="12" cy="12" r="4" fill="#667eea" />
      </svg>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const ball = document.getElementById('ball');

    let isDragging = false;

    let startMouseX = 0;
    let startMouseY = 0;

    let startWinX = 0;
    let startWinY = 0;

    let pending = false;

    let screenWidth = window.screen.width;
    let screenHeight = window.screen.height;

    const WIN_SIZE = 100;

    // 鼠标按下
    ball.addEventListener('mousedown', async (e) => {
      isDragging = true;

      const pos = await ipcRenderer.invoke('getWindowPosition');

      startWinX = pos.x;
      startWinY = pos.y;

      startMouseX = e.clientX;
      startMouseY = e.clientY;

      e.preventDefault();
    });

    // 鼠标移动（核心：requestAnimationFrame）
    document.addEventListener('mousemove', (e) => {
      if (!isDragging || pending) return;

      pending = true;

      requestAnimationFrame(() => {
        const deltaX = e.clientX - startMouseX;
        const deltaY = e.clientY - startMouseY;

        let newX = startWinX + deltaX;
        let newY = startWinY + deltaY;

        // 限制边界
        newX = Math.max(0, Math.min(newX, screenWidth - WIN_SIZE));
        newY = Math.max(0, Math.min(newY, screenHeight - WIN_SIZE));

        ipcRenderer.send('updateWindowPosition', {
          x: Math.round(newX),
          y: Math.round(newY),
        });

        pending = false;
      });
    });

    // 鼠标松开（吸边）
    document.addEventListener('mouseup', () => {
      if (!isDragging) return;

      isDragging = false;

      // 获取当前位置再吸边
      ipcRenderer.invoke('getWindowPosition').then((pos) => {
        let { x, y } = pos;

        const middle = screenWidth / 2;

        // 左右吸附
        if (x < middle) {
          x = 0;
        } else {
          x = screenWidth - WIN_SIZE;
        }

        ipcRenderer.send('updateWindowPosition', {
          x,
          y,
        });
      });
    });

    // 点击（避免拖拽误触）
    let moved = false;

    document.addEventListener('mousemove', () => {
      if (isDragging) moved = true;
    });

    ball.addEventListener('click', () => {
      if (moved) {
        moved = false;
        return;
      }

      ipcRenderer.send('toggleMainWindow');
    });
  </script>
</body>
</html>
